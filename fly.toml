# fly.toml — salmi on Fly.io
# Smallest always-on setup: shared-cpu-1x / 256 MB + 1 GB volume ≈ ~$2.1/month.
# Shared IPv4 only (a dedicated IPv4 would add $2/mo — don't allocate one).

app = "salmi"
primary_region = "arn" # Stockholm — closest region to Finland

swap_size_mb = 256 # free OOM insurance on a 256 MB machine

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/salmi.db"

[[mounts]]
  source = "salmi_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  # The AISStream websocket must stay connected, so never scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
